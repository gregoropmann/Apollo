<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Apollo Cinema — Terminal Invitation</title>
  <link rel="icon" type="image/png" sizes="32x32" href="https://www.apollokino.ee/inc/favicon/favicon-32x32.png" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #08080a;
      --surface:      #111115;
      --border:       #2c1a10;
      --green:        #ff79c6;
      --cyan:         #ffb86c; 
      --yellow:       #ff922b;
      --red:          #fa5252;
      --purple:       #e8590c;
      --dim:          #6e5643;
      --text:         #ffe8cc;
      --prompt-user:  #ff922b;
      --prompt-host:  #fd7e14;
      --prompt-path:  #e8590c;
    }

    :root {
      --green:        #ff922b;
      --cyan:         #ffa94d;
      --yellow:       #ffe0b2;
      --purple:       #d9480f;
    }

    ::selection {
      background: rgba(247, 103, 7, 0.25);
      color: var(--green);
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    body {
      padding: 12px;
      width: 100%;
    }

    .terminal-wrap {
      width: min(860px, 100%);
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(232,89,12,.08), 0 24px 80px rgba(0,0,0,.85);
      display: flex;
      flex-direction: column;
    }

    .title-bar {
      background: #050507;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dot.close  { background: #ff5f57; }
    .dot.min    { background: #febc2e; }
    .dot.max    { background: #28c840; }
    .title-text {
      margin-left: auto;
      margin-right: auto;
      font-size: 12px;
      color: var(--dim);
      letter-spacing: .06em;
      transform: translateX(-22px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #output {
      background: var(--surface);
      min-height: 440px;
      max-height: 60vh;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px 22px 8px;
      font-size: 13.5px;
      line-height: 1.7;
      scroll-behavior: smooth;
    }
    #output::-webkit-scrollbar { width: 5px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .input-row {
      display: flex;
      align-items: center;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px 22px 14px;
      gap: 6px;
    }

    .ascii-wrap {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      white-space: pre;
      line-height: 1.2;
      font-size: clamp(6px, 2.3vw, 13px);
      overflow-x: auto;
      max-width: 100%;
      margin-bottom: 10px;
    }
    .ascii-wrap::-webkit-scrollbar { height: 0px; display: none; }

    .rule-line {
      display: block;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: clamp(10px, 3.5vw, 13.5px);
      max-width: 100%;
    }

    @media (max-width: 480px) {
      body { padding: 8px; }
      .terminal-wrap { border-radius: 8px; }
      .title-bar { padding: 8px 12px; }
      .title-text { font-size: 11px; transform: translateX(-18px); }
      #output { padding: 14px 16px 6px; font-size: 12.5px; min-height: 400px; max-height: 55vh; }
      .input-row { padding: 10px 16px 14px; }
      .prompt-static { font-size: 12.5px; }
      #cmd-input { font-size: 12.5px; }
    }

    .prompt-static { white-space: nowrap; font-size: 13.5px; flex-shrink: 0; }
    .ps-user  { color: var(--prompt-user);  }
    .ps-at    { color: var(--dim);          }
    .ps-host  { color: var(--prompt-host);  }
    .ps-colon { color: var(--dim);          }
    .ps-path  { color: var(--prompt-path);  }
    .ps-dollar{ color: var(--green); margin-left: 4px; }

    #cmd-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      caret-color: var(--green);
      min-width: 50px;
    }

    .line       { display: block; white-space: pre-wrap; word-break: break-word; }
    .line.blank { height: .8em; }

    .c-green    { color: var(--green);  }
    .c-cyan     { color: var(--cyan);   }
    .c-yellow   { color: var(--yellow); }
    .c-red      { color: var(--red);    }
    .c-purple   { color: var(--purple); }
    .c-dim      { color: var(--dim);    }
    .c-text     { color: var(--text);   }

    .echo-prompt { color: var(--dim); }
    
    .term-link {
      color: var(--cyan);
      text-decoration: underline;
      cursor: pointer;
      word-break: break-all;
    }
    .term-link:hover {
      color: var(--green);
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .boot-line { animation: fadeIn .25s ease both; }
  </style>
</head>
<body>

<div class="terminal-wrap">
  <div class="title-bar">
    <div class="dot close"></div>
    <div class="dot min"></div>
    <div class="dot max"></div>
    <span class="title-text">guest@Apollo</span>
  </div>
  <div id="output"></div>
  <div class="input-row">
    <span class="prompt-static">
      <span class="ps-user">guest</span><span class="ps-at">@</span><span class="ps-host">Apollo</span><span class="ps-colon">:</span><span class="ps-path">~</span><span class="ps-dollar">$</span>
    </span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autofocus/>
  </div>
</div>

<script>
const out = document.getElementById('output');
const inp = document.getElementById('cmd-input');
const history = [];
let histIdx = -1;
let inviteExecuted = false;
let selectedMovie = "";
let awaitingDateTime = false;
let awaitingCustomMovie = false;

const DISCORD_WEBHOOK_URL = "https://discordapp.com/api/webhooks/1521992590478807291/jNF2b0tL8x4hc5-wfvx8UvpPrDnuf772HA3i0BSqiDKcYy6yPQGwtDQywO9EEXsS1HqM";

async function sendSelectionToDiscord(movieName, dateTimeText = "Not specified yet") {
  if (!DISCORD_WEBHOOK_URL) return;
  
  const payload = {
    content: "🎬 Hey <@1288118096036364329>, movie target acquired!",
    embeds: [{
      title: "Movie Target Acquired!",
      color: movieName === "Toy Story 5" ? 16621611 : (movieName === "Jackass" ? 15286543 : 14239759),
      fields: [
        { name: "Selected Vibe", value: `\`${movieName}\``, inline: true },
        { name: "Proposed Time", value: `\`${dateTimeText}\``, inline: true },
        { name: "Status", value: "Ready for Star Chairs 🍿", inline: false }
      ],
      timestamp: new Date().toISOString()
    }]
  };

  try {
    await fetch(DISCORD_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
  } catch (err) {
    console.error("Webhook submission failed:", err);
  }
}

const COMMANDS = {
  help() {
    if (awaitingDateTime || awaitingCustomMovie) return [h('c-yellow', '  [System] Please complete the current prompt sequence.')];
    return [
      h('', ''),
      h('c-cyan', '  Available system commands:'),
      h('', ''),
      h('c-green', '  help        ') + h('c-dim', '  Show available commands'),
      h('c-green', '  ls          ') + h('c-dim', '  List contents of directory'),
      h('c-green', '  clear       ') + h('c-dim', '  Clear terminal output'),
      h('', ''),
      h('c-yellow', '  Hint: Try running executable scripts using standard notation.')
    ];
  },

  ls() {
    if (awaitingDateTime || awaitingCustomMovie) return [h('c-yellow', '  [System] Please complete the current prompt sequence.')];
    return [
      h('', ''),
      h('c-green', '  invite.sh*'),
      h('', '')
    ];
  },

  clear() { out.innerHTML = ''; return []; },

  './invite.sh'(args) {
    if (awaitingDateTime || awaitingCustomMovie) return [h('c-yellow', '  [System] Please complete the current prompt sequence.')];
    inviteExecuted = true;
    return [
      h('', ''),
      h('c-purple', '  [System] Parsing configuration files... OK'),
      h('c-purple', '  [System] Accessing memory block 2021-2023 (Star Chairs & Snack orders)... OK'),
      h('', ''),
      `<span class="line rule-line c-cyan">=================== CHOOSE YOUR VIBE ===================</span>`,
      h('', ''),
      h('c-text', '  We are hitting up Apollo now that you\'re back from Switzerland.'),
      h('c-text', '  Pick the executable below matching the energy you want:'),
      h('', ''),
      h('c-green', '  1) ./toystory5 ') + h('c-dim', '  - Pure childhood nostalgia'),
      h('c-green', '  2) ./jackass   ') + h('c-dim', '  - Complete brainrot and absolute chaos'),
      h('c-green', '  3) ./custom    ') + h('c-dim', '  - Input a custom movie choice'),
      h('', ''),
    ];
  },

  invite() { return COMMANDS['./invite.sh'](); },
  './invite'() { return COMMANDS['./invite.sh'](); },

  './toystory5'() {
    if (!inviteExecuted) return [h('c-red', '  bash: ./toystory5: target initialization required first.')];
    if (awaitingCustomMovie) return [h('c-yellow', '  [System] Please input your custom movie title first.')];
    selectedMovie = "Toy Story 5";
    awaitingDateTime = true;
    return [
      h('', ''),
      h('c-yellow', '  [Selection Saved] -> Toy Story 5'),
      h('c-text', '  Excellent choice. Childhood nostalgia route secured.'),
      h('c-text', '  Check out the showtimes here: <a class="term-link" href="https://www.apollokino.ee/event/6164/lelulugu_5?theatreAreaID=1004" target="_blank">Apollo Toy Story 5 Event</a>'),
      h('', ''),
      h('c-cyan', '  [Prompt] Please type your preferred date and time (e.g., "Friday at 19:00"):'),
      h('', '')
    ];
  },
  toystory5() { return COMMANDS['./toystory5'](); },
  1() { return COMMANDS['./toystory5'](); },

  './jackass'() {
    if (!inviteExecuted) return [h('c-red', '  bash: ./jackass: target initialization required first.')];
    if (awaitingCustomMovie) return [h('c-yellow', '  [System] Please input your custom movie title first.')];
    selectedMovie = "Jackass";
    awaitingDateTime = true;
    return [
      h('', ''),
      h('c-red', '  [Selection Saved] -> Jackass'),
      h('c-text', '  Absolute brainrot route initialized.'),
      h('c-text', '  Emergency notice: Guard duty protocols for bushes have been updated.'),
      h('c-text', '  Check out the showtimes here: <a class="term-link" href="https://www.apollokino.ee/event/6700/jackass_viimane_ja_parim?theatreAreaID=1004" target="_blank">Apollo Jackass Event</a>'),
      h('', ''),
      h('c-cyan', '  [Prompt] Please type your preferred date and time (e.g., "Saturday at 21:30"):'),
      h('', '')
    ];
  },
  jackass() { return COMMANDS['./jackass'](); },
  2() { return COMMANDS['./jackass'](); },

  './custom'() {
    if (!inviteExecuted) return [h('c-red', '  bash: ./custom: target initialization required first.')];
    awaitingCustomMovie = true;
    return [
      h('', ''),
      h('c-purple', '  [Custom Protocol] Alternative override accepted.'),
      h('c-cyan', '  [Prompt] Please type the name of the movie you want to watch:'),
      h('', '')
    ];
  },
  custom() { return COMMANDS['./custom'](); },
  3() { return COMMANDS['./custom'](); }
};

function h(cls, text) {
  return `<span class="line ${cls}">${text}</span>`;
}

function appendHTML(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  Array.from(div.childNodes).forEach(n => out.appendChild(n.cloneNode ? n.cloneNode(true) : n));
}

function appendLines(lines) {
  appendHTML(lines.join('\n'));
  out.scrollTop = out.scrollHeight;
}

function echoPrompt(cmd) {
  appendHTML(`<span class="line echo-prompt"><span style="color:var(--green)">guest</span><span style="color:var(--dim)">@</span><span style="color:var(--cyan)">Apollo</span><span style="color:var(--dim)">:</span><span style="color:var(--purple)">~</span><span style="color:var(--green)">$</span> <span style="color:var(--text)">${cmd}</span></span>`);
}

function boot() {
  const asciiArt =
`<span class="c-cyan">    █████╗ ██████╗  ██████╗ ██╗     ██╗      ██████╗ 
  ██╔══██╗██╔══██╗██╔═══██╗██║     ██║     ██╔═══██╗
  ███████║██████╔╝██║   ██║██║     ██║     ██║   ██║
  ██╔══██║██╔═══╝ ██║   ██║██║     ██║     ██║   ██║
  ██║  ██║██║      ╚██████╔╝███████╗███████╗╚██████╔╝</span>
<span class="c-dim">  ╚═╝  ╚═╝╚═╝       ╚═════╝ ╚══════╝╚══════╝ ╚═════╝ </span>`;

  appendHTML(`<pre class="ascii-wrap boot-line" style="animation-delay:.05s">${asciiArt}</pre>`);

  const lines = [
    `<span class="line boot-line" style="animation-delay:.40s"> </span>`,
    `<span class="line boot-line c-yellow" style="animation-delay:.50s">  Welcome to Apollo (Session: Python_Alumni)</span>`,
    `<span class="line boot-line c-dim"    style="animation-delay:.60s">  Type <span class="c-green">help</span> or <span class="c-green">ls</span> to inspect system assets.</span>`,
    `<span class="line boot-line" style="animation-delay:.65s"> </span>`,
  ];
  appendHTML(lines.join(''));
}

inp.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const raw = inp.value.trim();
    inp.value = '';
    histIdx = -1;
    if (!raw) return;
    history.unshift(raw);
    echoPrompt(raw);
    
    const lowerRaw = raw.toLowerCase();
    if (lowerRaw === 'no' || lowerRaw === 'exit' || lowerRaw === 'quit' || lowerRaw === 'reject') {
      appendLines([
        h('c-red', '  [System] Session terminated by user request.'),
        h('c-dim', '  Redirecting to secure terminal proxy...'),
        h('', '')
      ]);
      
      if (DISCORD_WEBHOOK_URL) {
        fetch(DISCORD_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            content: "⚠️ Update on movie coordination parameters...",
            embeds: [{
              title: "Session Terminated",
              color: 16721494,
              description: "The user selected an exit sequence. System standing down.",
              timestamp: new Date().toISOString()
            }]
          })
        }).catch(err => console.error(err));
      }

      setTimeout(() => {
        window.location.href = "https://www.google.com";
      }, 1500);
      return;
    }

    if (awaitingCustomMovie) {
      awaitingCustomMovie = false;
      selectedMovie = raw;
      awaitingDateTime = true;
      appendLines([
        h('', ''),
        h('c-yellow', `  [Selection Saved] -> Custom Choice: "${raw}"`),
        h('c-text', '  Manual override parameters accepted.'),
        h('', ''),
        h('c-cyan', '  [Prompt] Please type your preferred date and time (e.g., "Sunday at 18:00"):'),
        h('', '')
      ]);
      return;
    }

    if (awaitingDateTime) {
      awaitingDateTime = false;
      sendSelectionToDiscord(selectedMovie, raw);
      appendLines([
        h('', ''),
        h('c-green', `  [Success] Schedule captured: "${raw}"`),
        h('c-text', '  Transmission sent successfully over network relays.'),
        h('c-dim', '  Coordination parameters complete. System standing down.'),
        h('', '')
      ]);
      return;
    }

    const parts = raw.split(/\s+/);
    const cmd = parts[0].toLowerCase();
    const args = parts.slice(1);

    const handler = COMMANDS[cmd];
    if (handler) {
      const result = handler(args);
      if (result && result.length) appendLines(result);
    } else {
      appendLines([
        h('c-red', `  bash: ${parts[0]}: command not found`),
        h('c-dim', `  Type <span class="c-green">help</span> for structural suggestions.`),
        h('', ''),
      ]);
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; inp.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; inp.value = history[histIdx]; }
    else { histIdx = -1; inp.value = ''; }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    if (awaitingDateTime || awaitingCustomMovie) return;
    const partial = inp.value.toLowerCase();
    const match = Object.keys(COMMANDS).find(c => c.startsWith(partial));
    if (match) inp.value = match;
  }
});

document.body.addEventListener('click', () => inp.focus());

boot();
</script>
</body>
</html>
